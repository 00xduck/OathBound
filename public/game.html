<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="DuckCSSv1-3.css">
    <link rel="icon" type="image/jpg" sizes="32x32" href="/img/favicon.jpg">
    <title>Oathbound</title>
</head>
<body style="background-color: rgb(89, 101, 25);
    background-position: 50%;">
    <div id="game">
        <canvas id="canvas"></canvas>
        <div class="bar">
            <div class="">
                <div id="healthbar-container">
                    <img id="healthbar-sprite" src="img/icons/healthbar.png"/>
                    <img src="img/icons/red_heart.png" id="heart">
                    <div id="healthbar-fill"></div>
                </div>
            </div>
            <div class="">
                <div id="manaBar-container">
                    <img id="manaBar-sprite" src="img/icons/manaBar.png"/>
                    <div id="manaBar-fill"></div>
                </div>
            </div>
            <div class="flex-center">
                <div class="cooldownDiv display-none">

                </div>
                <div class="selectedSpellDiv">

                </div>

            </div>

            <div class="slot-div" style="margin-right: 200px;">
                <div class="slot selected slot-03" id="hotbar1"></div>
                <div class="slot slot-13"  id="hotbar2"></div>
                <div class="slot slot-23"  id="hotbar3"></div>
                <div class="slot slot-33"  id="hotbar4"></div>
                <div class="slot slot-43" id="hotbar5"></div>
            </div>

        </div>

        <div class="effect-icons-div">
        </div>

        <div style="position: absolute;top: 55%;left: 50%;transform: translate(-50%, -50%);" class="flex-between">      
            <div class="crafting-div display-none margin-right-32">
            </div>  

            <div class="inventory-div display-none">
            </div>
        </div>


        <div class="container display-none">
            <div class="slots-div" id="slot-div-container"></div>
        </div>

        <div class="display-none trading-menu" id="trading-menu">

        </div>


        <div class="fps-div"></div>
        <div class="quest-div display-none" id="questDiv">

        </div>

        <div class="menuDiv center display-none" id="menu">
            <div class="flex-center">
                <h2>Menu</h2>
            </div>
            <div class="flex-center margin-top-32"><button class="btn-small background-color-gray" onclick="menu.save()">Save</button></div>
            <div class="flex-center margin-top-16"><button class="btn-small background-color-gray" onclick="menu.toggleOptionsScreen()">Options</button></div>
            <div class="flex-center margin-top-16"><button class="btn-small background-color-gray" onclick="menu.save(); menu.quit()">Quit and Save</button></div>
        </div>

        <div class="optionsDiv center display-none" id="options">
        </div>

        <div class="settingsDiv center display-none" id="settings">
        </div>

        <div class="loading-screen display-none" id="loadingScreen">
            <div class="flex-center">
                <h1 class="headline">Oathbound</h1>
            </div>
            <div class="flex-center">
                <progress value="0" max="100" class="loadingBar" id="loadingBar"></progress>
            </div>
            <div class="flex-center">
                <h1 style="color: black;" id="loadingInfo"></h1>
            </div>
        </div>

        <div class="bottom-right speaking-div display-none" id="speakingDiv">
            
            <div class="flex-space-arround padding-16">
                <div id="portrait" class="shadow"></div>
                <div class="speak-wrapper">
                    <div id="speak" style="font-size: 30px;"></div>
                    <button class="next-btn display-none" id="speakBtn"></button>
                </div>
            </div>
        </div>

        <div class="AchievementsWrapper display-none flex-center">
            <div class="achievementIcon">
                
            </div>
            <div class="achievementText">
                <div class="flex-center" id="achievementName" style="font-size: 35px;"></div>
                <hr>
                <div class="flex-center" id="achievementDesc" style="font-size: 20px;"></div>
            </div>
        </div>

        <div class="magicDiv display-none">
            <div class="innerMagicDiv">

            </div>

        </div>

        <div class="display-none companionDiv center-true" id="companionDiv">
            <div class="companionInnerDiv" id="companionInnerDiv"></div>
            <div class="margin-left-32" style="margin-top: -50px;">
                <button class="closeBtn" onclick="player.companions.forEach(com => { com.selected = false })"></button>
            </div>
        </div>


    </div>

    <div class="info-div">
        <h1 id="info"></h1>
    </div>
    <div class="blur-div" style="position: absolute; width: 100%;height: 100%;z-index: 99;" id="blur">
    </div>
    <div class="death-screen display-none" id="deathScreen">
        <div class="flex-center">
            <h1 style="font-size: 75px;">You Died!</h1>
        </div>
        <div class="flex-center margin-top-32">
            <button class="deathBtn" onclick="player.respawn()">Respawn</button>
        </div>
        <div class="flex-center margin-top-32">
            <button class="deathBtn" onclick="player.respawn();menu.save(); menu.quit()">Quit and Save</button>
        </div>
    </div>
    <script>
        document.querySelectorAll('.slot').forEach((slot, i) => {
            slot.addEventListener('click', e => {
                switchHotbarSlot(e, i)
            })
        })
    </script>
    <script src="player.js"></script>
    <script src="spells.js"></script>
    <script src="enemies.js"></script>
    <script src="otherClasses.js"></script>
    <script src="blocks.js"></script>
    <script src="GUI.js"></script>
    <script src="index.js"></script>
</body>
</html>
